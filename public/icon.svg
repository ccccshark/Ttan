<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#FF8C42"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="100" height="100" rx="22" fill="#05060f"/>
  
  <circle cx="50" cy="50" r="38" fill="none" stroke="url(#accentGrad)" stroke-width="2" opacity="0.2"/>
  
  <g filter="url(#glow)">
    <polygon points="50,18 50,82 82,50" fill="url(#accentGrad)"/>
    
    <circle cx="50" cy="50" r="18" fill="#05060f"/>
    
    <polygon points="50,38 50,62 68,50" fill="url(#accentGrad)"/>
    
    <circle cx="50" cy="50" r="6" fill="url(#accentGrad)"/>
  </g>
  
  <circle cx="50" cy="50" r="3" fill="#ffffff" opacity="0.8"/>
</svg>